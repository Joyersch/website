<script src="./js/moment.js"></script>
<script>
  function getYears(date) {
    const now = moment();
    const than = moment(date);
    const y = now.diff(than, 'years', false);
    const m = now.diff(than, 'months', false) - (y * 12);
    return y;
  }

  function getMonths(date) {
    const now = moment();
    const than = moment(date);
    const y = now.diff(than, 'years', false);
    const m = now.diff(than, 'months', false) - (y * 12);
    return m;
  }

  const name = "joy";
  const pronouns = "she/her";
  const birthDate = "2001-08-30";
  const devSince = "2023-08-09";
  const codingSince = "2017-10-01"; // estimation

  const ageDisplay = document.getElementById("ageDisplay");
  const pronounsDisplay = document.getElementById("pronounsDisplay");
  const nameDisplay = document.getElementById("nameDisplay");
  const devSinceYearDisplay = document.getElementById("devSinceYearDisplay");
  const devSinceMonthDisplay = document.getElementById("devSinceMonthDisplay");
  const codingSinceYearDisplay = document.getElementById("codingSinceYearDisplay");
  const codingSinceMonthDisplay = document.getElementById("codingSinceMonthDisplay");

  ageDisplay.innerHTML = ageDisplay.innerHTML + getYears(birthDate) + 'y/o';
  pronounsDisplay.innerHTML = pronouns;
  nameDisplay.innerHTML = name;
  devSinceYearDisplay.innerHTML = getYears(devSince);
  devSinceMonthDisplay.innerHTML = getMonths(devSince);
  codingSinceYearDisplay.innerHTML = getYears(codingSince);
  codingSinceMonthDisplay.innerHTML = getMonths(codingSince);
</script>
